# 插件唯一标识。
# 必填。
# 需要在宿主仓库范围内唯一，并使用`kebab-case`命名风格。
id: plugin-demo-source

# 插件显示名称。
# 必填。
# 用于插件管理页面、开发文档和人工 review 展示。
name: 源码插件示例

# 插件语义化版本号。
# 必填。
# 需要使用`semver`格式。
# 当前项目中的示例统一使用带`v`前缀的写法，例如`v0.1.0`。
version: v0.1.0

# 插件一级类型。
# 必填。
# 可选值说明：
# - `source`：源码插件，目录位于`apps/lina-plugins/<plugin-id>/`下，并随宿主一起编译和交付。
# - `dynamic`：动态插件，为后续运行时安装、启停、升级链路预留的类型。
type: source

# 插件说明。
# 可选。
# 建议概述插件的能力边界，方便开发者和 reviewer 快速理解插件用途。
description: 提供左侧菜单页面与公开/受保护路由示例的源码插件（一期源码插件MVP）

# 插件作者或归属团队。
# 可选。
author: lina-team

# 插件主页或文档地址。
# 可选。
# 用于补充项目介绍、设计文档或外部说明链接。
homepage: https://example.com/lina/plugins/plugin-demo-source

# 插件许可证标识。
# 可选。
license: Apache-2.0
