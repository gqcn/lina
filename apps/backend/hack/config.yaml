
# CLI tool, only in development environment.
# https://goframe.org/docs/cli
gfcli:
  gen:
    dao:
      - link: "sqlite::@file(./temp/data/data.db)"
        tables: "sys_user,sys_dict_type,sys_dict_data,sys_dept,sys_post,sys_user_dept,sys_user_post"
        descriptionTag: true
        noModelComment: true

  docker:
    build: "-a amd64 -s linux -p temp -ew"
    tagPrefixes:
      - my.image.pub/my-app
