# https://goframe.org/docs/web/server-config-file-template
server:
  address:     ":8080"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"
  dumpRouterMap: false

# https://goframe.org/docs/core/glog-config
logger:
  level : "all"
  stdout: true

# https://goframe.org/docs/core/gdb-config-file
database:
  default:
    link: "mysql:root:12345678@tcp(127.0.0.1:3306)/lina?charset=utf8mb4&parseTime=true&loc=Local&multiStatements=true"
    debug: true

jwt:
  secret: "lina-jwt-secret-key-change-in-production"
  expireHour: 24

session:
  timeoutHour: 24     # Session inactive timeout (hours), sessions with no activity beyond this will be cleaned up
  cleanupMinute: 5    # Session cleanup task interval (minutes)

upload:
  path: "temp/upload"
  maxSize: 10  # Maximum upload file size in MB

plugin:
  runtime:
    storagePath: "temp/runtime"

# OpenAPI documentation configuration
openapi:
  title: "Lina Admin API"
  description: "Lina后台管理系统接口文档。"
  version: "v0.5.0"
  serverUrl: "http://localhost:8080"
  serverDescription: "BackEndpoint"

# System info page component configuration
components:
  backend:
    - name: "GoFrame"
      version: "auto"
      url: "https://goframe.org"
      description: "Go语言应用开发框架"
    - name: "MySQL"
      version: "auto"
      url: "https://www.mysql.com"
      description: "关系型数据库"
    - name: "JWT"
      version: "v5.3.1"
      url: "https://jwt.io"
      description: "身份认证"
    - name: "Excelize"
      version: "v2.10.1"
      url: "https://github.com/qax-os/excelize"
      description: "Excel文件处理库"
  frontend:
    - name: "Vue"
      version: "3.x"
      url: "https://vuejs.org"
      description: "渐进式JavaScript框架"
    - name: "Vben Admin"
      version: "5.x"
      url: "https://www.vben.pro"
      description: "中后台管理框架"
    - name: "Ant Design Vue"
      version: "4.x"
      url: "https://antdv.com"
      description: "UI组件库"
    - name: "TypeScript"
      version: "5.x"
      url: "https://www.typescriptlang.org"
      description: "类型安全的JavaScript"
    - name: "Vite"
      version: "6.x"
      url: "https://vite.dev"
      description: "前端构建工具"
    - name: "Pinia"
      version: "3.x"
      url: "https://pinia.vuejs.org"
      description: "状态管理"
    - name: "TailwindCSS"
      version: "4.x"
      url: "https://tailwindcss.com"
      description: "原子化CSS框架"

# Database initialization (executed by `make init`)
# Scans sqlDir for *.sql files, sorted by ASCII order, executed sequentially
init:
  sqlDir: "manifest/sql"
